<!-- Updated scroll-to-top button implementation -->
<html>
<head>
    <title>Scroll to Top Example</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            height: 2000px; /* Just for demonstration */
            margin: 0;
        }
        #scrollToTopBtn {
            position: fixed;
            bottom: 20px;
            right: 30px;
            display: none;
            background-color: #555;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 10px;
            cursor: pointer;
        }
        #scrollToTopBtn:hover {
            background-color: #333;
        }
    </style>
</head>
<body>
    <h1>Scroll Down to See the Button</h1>
    <button id="scrollToTopBtn" onclick="scrollToTop()">Top</button>

    <script>
        // Get the button
        var mybutton = document.getElementById("scrollToTopBtn");

        // When the user scrolls down 20px from the top of the document, show the button
        window.onscroll = function() {scrollFunction()};

        function scrollFunction() {
            if (document.body.scrollTop > 20 || document.documentElement.scrollTop > 20) {
                mybutton.style.display = "block";
            } else {
                mybutton.style.display = "none";
            }
        }

        // When the user clicks on the button, scroll to the top of the document
        function scrollToTop() {
            document.body.scrollTop = 0; // For Safari
            document.documentElement.scrollTop = 0; // For Chrome, Firefox, IE and Opera
        }
    </script>
</body>
</html>
